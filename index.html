<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="A simple Hello World site deployed with Netlify.">
    <title>Hello World | Beyond the Burn</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #fff0f7;
        --ink: #1f2933;
        --accent: #db2777;
        --panel: #fff7fb;
        --ring: rgba(219, 39, 119, 0.22);
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top left, rgba(219, 39, 119, 0.18), transparent 30rem),
          linear-gradient(135deg, var(--bg), #fdf2f8);
        color: var(--ink);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 46rem);
        padding: clamp(2rem, 6vw, 4.5rem);
        border: 1px solid rgba(31, 41, 51, 0.12);
        border-radius: 8px;
        background: color-mix(in srgb, var(--panel) 92%, white);
        box-shadow: 0 24px 80px rgba(31, 41, 51, 0.14);
        text-align: center;
      }

      p {
        margin: 0;
        color: #52616b;
        font-size: clamp(1rem, 2vw, 1.2rem);
        line-height: 1.65;
      }

      h1 {
        margin: 0 0 1rem;
        font-size: clamp(2.5rem, 10vw, 6rem);
        line-height: 0.95;
        letter-spacing: 0;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 1.25rem;
        padding: 0.45rem 0.75rem;
        border: 1px solid var(--ring);
        border-radius: 999px;
        color: var(--accent);
        font-size: 0.85rem;
        font-weight: 700;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="badge">Netlify ready</div>
      <h1>Hello, world.</h1>
      <p>
        This tiny site is ready to deploy from GitHub through Netlify.
      </p>
    </main>
  </body>
</html>
